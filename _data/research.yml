- id: plasma       
  title: "基于血浆多维标志物（Aβ/tau/GFAP）构建预测AD神经退行性速率的计算模型研究"
  image: /images/top1.png
  url: https://...
  description: 张三, 李四, 王五, Nature Medicine, 2024
  abstract: 血浆Aβ和p-Tau双阳性（A+/T+）个体的各项AD病理指标最严重。星形胶质细胞反应性（以血浆GFAP衡量）是连接核心病理的关键环节。它不仅与Aβ和p-Tau水平独立相关，更重要的是，它与这两者协同作用，显著加剧了tau蛋白缠结、轴突变性和皮质变薄等神经退行性损伤。该研究证实了血浆标志物在华人AD诊断中的价值，并提供了新证据，表明星形胶质细胞反应性是驱动AD病理从早期Aβ、tau阶段向后期神经退行性变发展的关键加速器，提示靶向抑制星形胶质细胞的过度反应可能是预防AD的重要治疗策略。

- id: ti          
  title: "时域干涉（TI）电场聚焦的个体化精准计算与靶点验证"
  image: /images/top2.png
  url: https://...
  description: 赵六, 钱七, Neuron, 2025
  abstract: 无创深部脑刺激是神经调控领域的重大挑战，传统技术（如TMS, tACS）难以在不影响表层皮质的情况下精准作用于海马体等深部靶点。时域干涉（TI）技术通过施加两个略有差异的高频电场，利用其拍频效应在目标深处产生低频刺激，为这一难题带来了革命性解决方案。本团队以及合作者建立了高精度的、基于个体头部解剖结构（源于MRI数据）的TI电场分布有限元计算模型，能够为特定患者、特定靶点（如海马）优化电极布局和刺激参数。我们正通过临床合作，验证该个体化方案在靶向调控深部神经活动、改善记忆相关环路功能方面的有效性与安全性。
